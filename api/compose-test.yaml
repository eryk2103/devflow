services:
  test_database:
    image: postgres:18-alpine
    container_name: devflow_database_test
    environment:
      POSTGRES_DB: test_app
      POSTGRES_PASSWORD: root
      POSTGRES_USER: app
    healthcheck:
      test: [ "CMD", "pg_isready", "-d", "test_app", "-U", "app" ]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "5433:5432"